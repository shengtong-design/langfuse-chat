task_name: nutrition
agent: nutrition_advisor
prompt_key: fitness_nutrition_task

# description/expected_output come from Langfuse at runtime.
# fallback is used only when Langfuse is unreachable.
fallback:
  description: |
    Create nutrition recommendations that support the workout program and goals:
    1. Daily caloric needs estimate
    2. Macronutrient recommendations
    3. Meal timing suggestions around workouts
    4. Hydration guidelines
    5. Supplement recommendations (if appropriate)

    User's goal: {goals}
  expected_output: >
    Nutrition guidelines in markdown format including calorie and macro
    recommendations, meal timing, and practical eating suggestions.
