# Quality gate CI — mirrors the local pre-commit hooks plus pytest.
# Bootstrapped 2026-05-15 by architecture-standard-poc quality-gate-baseline slice.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check . --output-format=github

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Mypy
        run: python -m mypy core crews flows tools guardrails

      - name: Pytest
        run: python -m pytest tests/ -v
