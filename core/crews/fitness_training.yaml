agents:
  fitness_analyst:
    role: Fitness Analyst
    goal: >
      Analyze user fitness goals, current fitness level, and preferences to create
      a comprehensive fitness profile
    backstory: >
      You are an experienced fitness analyst with expertise in understanding
      different body types, fitness levels, and training goals. You have helped
      thousands of clients achieve their fitness objectives through careful
      analysis and personalized recommendations.

  workout_designer:
    role: Workout Program Designer
    goal: >
      Design effective and safe workout programs tailored to individual needs
      and goals
    backstory: >
      You are a certified personal trainer and workout program designer with
      over 15 years of experience. You specialize in creating progressive
      training programs that maximize results while minimizing injury risk.
      You understand periodization, exercise selection, and program structure.

  nutrition_advisor:
    role: Nutrition Advisor
    goal: >
      Provide nutrition guidance that supports the fitness goals and training
      program
    backstory: >
      You are a certified nutritionist specializing in sports nutrition.
      You understand how to optimize nutrition for different training goals
      including muscle building, fat loss, and athletic performance.

tasks:
  analysis:
    agent: fitness_analyst
    description: |
      Analyze the user's fitness profile based on the following information:
      - User Goals: {goals}
      - Current Fitness Level: {fitness_level}
      - Available Equipment: {equipment}
      - Time Available: {time_per_week} hours per week
      - Any Limitations: {limitations}

      Create a comprehensive fitness profile that includes:
      1. Assessment of current fitness state
      2. Realistic goal timeline
      3. Key areas to focus on
      4. Potential challenges and how to overcome them
    expected_output: >
      A detailed fitness profile analysis in markdown format including
      current state assessment, goal analysis, focus areas, and recommendations.

  workout:
    agent: workout_designer
    description: |
      Based on the fitness analysis, design a complete workout program that includes:
      1. Weekly workout schedule
      2. Specific exercises for each session
      3. Sets, reps, and rest periods
      4. Progression plan for the next 4-8 weeks
      5. Warm-up and cool-down routines

      Consider the user's available time of {time_per_week} hours per week
      and equipment: {equipment}
    expected_output: >
      A complete workout program in markdown format with weekly schedule,
      detailed exercise descriptions, and progression guidelines.

  nutrition:
    agent: nutrition_advisor
    description: |
      Create nutrition recommendations that support the workout program and goals:
      1. Daily caloric needs estimate
      2. Macronutrient recommendations
      3. Meal timing suggestions around workouts
      4. Hydration guidelines
      5. Supplement recommendations (if appropriate)

      User's goal: {goals}
    expected_output: >
      Nutrition guidelines in markdown format including calorie and macro
      recommendations, meal timing, and practical eating suggestions.

output_sections:
  - title: "## Fitness Profile Analysis"
    task: analysis
  - title: "## Workout Program"
    task: workout
  - title: "## Nutrition Plan"
    task: nutrition
